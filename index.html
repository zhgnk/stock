<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>股票买卖结算器</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

    <div class="input-group">
        <label for="availableFunds">可用资金:</label>
        <input type="number" id="availableFunds" value="0.00" step="0.01">
        <span class="error-message" id="fundsError"></span>
    </div>
    <p class="current-funds">当前可用资金: <span id="currentFundsDisplay">0.00</span> 元</p>

    <div class="transaction-type">
        <label><input type="radio" name="transaction" value="buy" checked onchange="handleTransactionTypeChange()">
            买入</label>
        <label><input type="radio" name="transaction" value="sell" onchange="handleTransactionTypeChange()">
            卖出</label>
    </div>

    <div class="input-group">
        <label for="shares">股数:</label>
        <input type="number" id="shares" placeholder="请输入股数">
        <span class="error-message" id="sharesError"></span>
    </div>
    <div class="input-group">
        <label for="price">价格 (元/股):</label>
        <input type="number" id="price" placeholder="请输入价格">
        <span class="error-message" id="priceError"></span>
    </div>

    <div class="input-group">
        <label style="font-weight: normal; cursor: pointer;">
            <input type="checkbox" id="minCommissionToggle" checked> 启用最低佣金 5 元限制
        </label>
    </div>

    <button onclick="calculateAndApplySettlement()">计算并更新资金</button>

    <div class="result">
        <h2>结算详情</h2>
        <p>成交金额: <span id="transactionAmount">0.00</span> 元</p>
        <p>佣金: <span id="commission">0.00</span> 元</p>
        <p>过户费: <span id="transferFee">0.00</span> 元</p>
        <p id="stampDutyRow" style="display: none;">印花税: <span id="stampDuty">0.00</span> 元</p>
        <p class="total">本次结算金额: <span id="totalSettlement">0.00</span> 元</p>
    </div>
</div>

<script>
    const COMMISSION_RATE = 0.0001, COMMISSION_MIN = 5, STAMP_DUTY_RATE = 0.0005, TRANSFER_FEE_RATE = 0.00001;

    const availableFundsInput = document.getElementById('availableFunds');
    const currentFundsDisplay = document.getElementById('currentFundsDisplay');
    const sharesInput = document.getElementById('shares');
    const priceInput = document.getElementById('price');
    const minCommissionToggle = document.getElementById('minCommissionToggle');

    function showError(el, msg) {
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideError(el) {
        el.textContent = '';
        el.style.display = 'none';
    }

    function calculateFees() {
        const transactionType = document.querySelector('input[name="transaction"]:checked').value;
        const isMinCommissionEnabled = minCommissionToggle.checked;

        const shares = parseFloat(sharesInput.value);
        const price = parseFloat(priceInput.value);

        if (isNaN(shares) || shares <= 0 || isNaN(price) || price <= 0) return null;

        const transactionAmount = shares * price;

        let commission = transactionAmount * COMMISSION_RATE;
        if (isMinCommissionEnabled) {
            commission = Math.max(commission, COMMISSION_MIN);
        }

        const transferFee = transactionAmount * TRANSFER_FEE_RATE;
        const stampDuty = transactionType === 'sell' ? (transactionAmount * STAMP_DUTY_RATE) : 0;

        let rawTotal = 0;
        if (transactionType === 'buy') {
            rawTotal = transactionAmount + commission + transferFee;
        } else {
            rawTotal = transactionAmount - commission - transferFee - stampDuty;
        }

        const finalTotal = Math.ceil(rawTotal * 100) / 100;

        return {
            transactionAmount,
            commission,
            transferFee,
            stampDuty,
            transactionSettlementAmount: finalTotal
        };
    }

    function updateResultDisplay(data) {
        document.getElementById('transactionAmount').textContent = data ? data.transactionAmount.toFixed(2) : '0.00';
        document.getElementById('commission').textContent = data ? data.commission.toFixed(2) : '0.00';
        document.getElementById('transferFee').textContent = data ? data.transferFee.toFixed(2) : '0.00';
        document.getElementById('stampDuty').textContent = data ? data.stampDuty.toFixed(2) : '0.00';
        document.getElementById('totalSettlement').textContent = data ? data.transactionSettlementAmount.toFixed(2) : '0.00';
    }

    function calculateAndApplySettlement() {
        const res = calculateFees();
        if (!res) {
            if (isNaN(sharesInput.value)) showError(document.getElementById('sharesError'), '请输入有效股数');
            return;
        }

        let funds = parseFloat(availableFundsInput.value);
        const type = document.querySelector('input[name="transaction"]:checked').value;

        if (type === 'buy' && funds < res.transactionSettlementAmount) {
            alert('资金不足！');
            return;
        }

        funds = (type === 'buy') ? funds - res.transactionSettlementAmount : funds + res.transactionSettlementAmount;
        availableFundsInput.value = funds.toFixed(2);
        currentFundsDisplay.textContent = funds.toFixed(2);
        updateResultDisplay(res);
    }

    function handleTransactionTypeChange() {
        document.getElementById('stampDutyRow').style.display = document.querySelector('input[name="transaction"]:checked').value === 'sell' ? 'flex' : 'none';
        updateResultDisplay(calculateFees());
    }

    [sharesInput, priceInput, minCommissionToggle].forEach(el => el.addEventListener('input', () => updateResultDisplay(calculateFees())));
    document.addEventListener('DOMContentLoaded', () => updateResultDisplay(calculateFees()));
</script>
</body>

</html>
